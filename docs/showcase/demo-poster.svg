<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Scriptorium Public Alpha verified synthetic demo</title>
  <desc id="desc">A local-first research workflow product card showing three matched components, nine successful stages, six passed assertions, and zero credentials or private paths.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="0.68" stop-color="#f2eee3"/>
      <stop offset="1" stop-color="#e7decb"/>
    </linearGradient>
    <pattern id="grain" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M0 1H6" stroke="#17201d" stroke-opacity=".025"/>
    </pattern>
    <pattern id="ledger" width="410" height="35" patternUnits="userSpaceOnUse">
      <path d="M0 34.5H410" stroke="#ffffff" stroke-opacity=".05"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="14" dy="15" stdDeviation="0" flood-color="#d8cdb8"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>
  <rect x="7" y="7" width="1186" height="616" fill="none" stroke="#143d37" stroke-width="14"/>
  <rect x="31" y="31" width="1138" height="568" fill="none" stroke="#17201d" stroke-opacity=".18"/>

  <rect x="58" y="67" width="39" height="5" fill="#c9482f"/>
  <text x="111" y="77" fill="#143d37" font-family="Consolas, monospace" font-size="15" font-weight="700" letter-spacing="2.2">SCRIPTORIUM / PUBLIC ALPHA</text>

  <text x="58" y="170" fill="#17201d" font-family="Iowan Old Style, Palatino Linotype, Songti SC, serif" font-size="62" font-weight="600" letter-spacing="-2">研究上下文，</text>
  <text x="58" y="236" fill="#17201d" font-family="Iowan Old Style, Palatino Linotype, Songti SC, serif" font-size="62" font-weight="600" letter-spacing="-2">不随一次对话消失。</text>
  <text x="60" y="286" fill="#46514d" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="20">把模糊想法、文献与 Agent 协作过程，沉淀为可恢复、</text>
  <text x="60" y="319" fill="#46514d" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="20">可追溯、可继续推进的科研项目。</text>

  <path d="M58 361H690M58 446H690" stroke="#17201d" stroke-opacity=".2"/>
  <g font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#c9482f" letter-spacing="1.5">
    <text x="58" y="388">01</text><text x="184" y="388">02</text><text x="310" y="388">03</text><text x="436" y="388">04</text><text x="562" y="388">05</text>
  </g>
  <g font-family="Iowan Old Style, Palatino Linotype, Songti SC, serif" font-size="16" font-weight="700" fill="#17201d">
    <text x="58" y="419">科研直觉</text><text x="184" y="419">文献证据</text><text x="310" y="419">研究状态</text><text x="436" y="419">项目记忆</text><text x="562" y="419">论文 / 汇报</text>
  </g>
  <g stroke="#17201d" stroke-opacity=".2">
    <path d="M165 375V432M291 375V432M417 375V432M543 375V432"/>
  </g>

  <g font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#143d37" letter-spacing=".6">
    <rect x="58" y="478" width="118" height="34" fill="#fff" fill-opacity=".32" stroke="#2c5e56"/><text x="72" y="500">LOCAL-FIRST</text>
    <rect x="185" y="478" width="134" height="34" fill="#fff" fill-opacity=".32" stroke="#2c5e56"/><text x="199" y="500">FILE CONTRACTS</text>
    <rect x="328" y="478" width="126" height="34" fill="#fff" fill-opacity=".32" stroke="#2c5e56"/><text x="342" y="500">HUMAN-GATED</text>
    <rect x="463" y="478" width="132" height="34" fill="#fff" fill-opacity=".32" stroke="#2c5e56"/><text x="477" y="500">MODEL-NEUTRAL</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="738" y="42" width="408" height="542" fill="#143d37"/>
    <rect x="738" y="42" width="408" height="542" fill="url(#ledger)"/>
  </g>
  <text x="772" y="87" fill="#d9e5d6" font-family="Consolas, monospace" font-size="15" font-weight="700" letter-spacing="2">VERIFIED SYNTHETIC DEMO</text>
  <text x="772" y="110" fill="#9fb7b0" font-family="Consolas, monospace" font-size="11">Windows · local release candidate · remote CI pending</text>

  <g font-family="Iowan Old Style, Palatino Linotype, serif" font-size="39" font-weight="600" fill="#ffcb74">
    <text x="772" y="178">3/3</text><text x="772" y="261">9</text><text x="772" y="344">6</text>
  </g>
  <g font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="14" fill="#edf1e8">
    <text x="862" y="161">组件版本与兼容基线</text><text x="862" y="184">完全匹配</text>
    <text x="862" y="244">跨组件黄金路径阶段</text><text x="862" y="267">全部 exit 0</text>
    <text x="862" y="327">契约、综述、记忆、检索</text><text x="862" y="350">与 MCP 断言通过</text>
  </g>
  <g stroke="#fff" stroke-opacity=".15"><path d="M772 205H1112M772 288H1112M772 371H1112"/></g>

  <rect x="772" y="400" width="158" height="72" fill="none" stroke="#fff" stroke-opacity=".2"/>
  <rect x="944" y="400" width="168" height="72" fill="none" stroke="#fff" stroke-opacity=".2"/>
  <text x="788" y="432" fill="#ffcb74" font-family="Consolas, monospace" font-size="20" font-weight="700">0</text>
  <text x="788" y="454" fill="#d9e5d6" font-family="Consolas, monospace" font-size="11">API CREDENTIALS</text>
  <text x="960" y="432" fill="#ffcb74" font-family="Consolas, monospace" font-size="20" font-weight="700">0</text>
  <text x="960" y="454" fill="#d9e5d6" font-family="Consolas, monospace" font-size="11">PRIVATE PATHS</text>

  <g transform="translate(917 519) rotate(-7)">
    <rect width="197" height="40" fill="#f2eee3" fill-opacity=".96" stroke="#c9482f" stroke-width="3"/>
    <text x="14" y="26" fill="#c9482f" font-family="Consolas, monospace" font-size="13" font-weight="900" letter-spacing="1.3">SYNTHETIC · VERIFIED</text>
  </g>

  <text x="58" y="568" fill="#69726e" font-family="Consolas, monospace" font-size="10">可复现工程验收，不代表科学结论或外部用户价值已经验证。</text>
</svg>
